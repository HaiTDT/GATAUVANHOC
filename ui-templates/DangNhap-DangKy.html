    <style>

            font-family: 'Be Vietnam Pro', sans-serif;

            background: linear-gradient(135deg, #9d4300 0%, #fd761a 100%);
        }
        .glass-header {
            background: rgba(249, 249, 249, 0.8);

<body class="bg-surface text-on-surface min-h-screen flex flex-col">
    <div class="fixed inset-0 z-0">
        <img alt="Botanical Background" class="w-full h-full object-cover opacity-10" data-alt="Soft aesthetic background of organic botanical leaves and blurred glass textures for a high-end beauty brand atmosphere" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBLiBgG8H4R4nEW0-xaFI6ZHQd4zBXyGlaStshdD2rxrJ8xPHNq58jBHQIcAFTF2k4B89rjW9vàNef0eV-9dVKBjK5xmNDFrWXdtD0FfWuR5-lhJKNpOGcBI0qYR_MA6VIyvàQqN_6o0aL58BS3dqmsLKLjmmPdEDgB0ssgmJ0vàlbzDPgAZnQHhn_jAf6mawQvà_7AE_dWGTm5kmxx4nVQa4DzumyYV9ZCEWzhbVlhPm8wNyRmtEL7cBAWT9nTYG-MPN-uOvàPgfhG1ovàGa"/>
        <div class="absolute inset-0 bg-surface-container-low/60 backdrop-blur-sm"></div>
    </div>
    
    <main class="relative z-10 flex-grow flex items-center justify-center px-4 py-12">
        <div class="w-full max-w-[460px] bg-surface-container-lowest rounded-xl shadow-[0_32px_64px_rgba(0,80,47,0.06)] overflow-hidden transition-all duration-300">
            <div class="px-8 pt-10 pb-6 text-center">
                <div class="brand-logo text-2xl font-extrabold tracking-tight text-primary mb-4">
                    Hasaki
                </div>
                <h1 class="text-2xl font-bold text-on-surface tracking-tight leading-tight">
                    Đăng nhập vào tài khoản
                </h1>
                <p class="text-on-surface-variant mt-2 font-body text-sm">
                    Chào mừng bạn quay trở lại với không gian làm đẹp hữu cơ.
                </p>
            </div>
            
            <div class="px-8 pb-10">
                <form class="space-y-6" onsubmit="return false;">
                    <div class="space-y-2">
                        <label class="block text-sm font-semibold text-on-surface-variant font-label">
                            Email hoặc Số điện thoại
                        </label>
                        <input class="w-full px-4 py-3 bg-surface-variant border-none rounded-lg focus:ring-1 focus:ring-primary focus:bg-surface-container-lowest transition-all duration-200 placeholder:text-outline/60 text-on-surface" placeholder="example@email.com" type="text"/>
                    </div>
                    
                    <div class="space-y-2">
                        <div class="flex justify-between items-center">
                            <label class="block text-sm font-semibold text-on-surface-variant font-label">
                                Mật khẩu
                            </label>
                            <a class="text-xs font-medium text-secondary hover:opacity-80 transition-opacity" href="#">
                                Quên mật khẩu?
                            </a>
                        </div>
                        <div class="relative">
                            <input class="w-full px-4 py-3 bg-surface-variant border-none rounded-lg focus:ring-1 focus:ring-primary focus:bg-surface-container-lowest transition-all duration-200 placeholder:text-outline/60 text-on-surface" placeholder="••••••••" type="password"/>
                            <button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant opacity-60" type="button">
                                <span class="material-symbols-outlined text-xl" data-icon="visibility">visibility</span>
                            </button>
                        </div>
                    </div>
                    
                    <button class="w-full bg-primary-container text-on-primary py-4 rounded-lg font-bold text-sm tracking-wide shadow-sm hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                        Đăng nhập
                        <span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
                    </button>
                </form>
                
                <div class="relative my-8">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-surface-container-highest"></div>
                    </div>
                    <div class="relative flex justify-center text-xs uppercase tracking-widest font-bold">
                        <span class="bg-surface-container-lowest px-4 text-outline">Hoặc</span>
                    </div>
                </div>
                
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <button class="flex items-center justify-center gap-3 py-3 border border-outline-variant/30 rounded-lg bg-surface-container-lowest hover:bg-surface-container-low transition-colors group">
                        <img alt="Google Logo" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCML0Ltf_DxxiFIBfT4OVMl9ZEQLwROtTOJ8Svà_uIQFvàCeYOskHJcR0wU1owSJKF6BBLue7BFkEqLFxlJ3mlsizCbG051FbHCFJR4jpjalKb-JGXW3EDY9wJLIdUjJQmEjzNR-vàUS7_twUISsnF5V1sQXOWgYQtnJnDmYucN-5cahGUHZweRoTM7cdJHg5axrsbTquy_ojKY1QgISbFi6GElzlvàCS7RjvàYO67BVvàrwd8OtbmiJilg4BAs1_vàeNcyWCHd6sbmJUROOGd"/>
                        <span class="text-sm font-semibold text-on-surface font-label group-hover:text-primary transition-colors">Google</span>
                    </button>
                    <button class="flex items-center justify-center gap-3 py-3 border border-outline-variant/30 rounded-lg bg-surface-container-lowest hover:bg-surface-container-low transition-colors group">
                        <svg class="w-5 h-5 text-[#1877F2]" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"></path>
                        </svg>
                        <span class="text-sm font-semibold text-on-surface font-label group-hover:text-primary transition-colors">Facebook</span>
                    </button>
                </div>
            </div>
            
            <div class="px-8 py-6 bg-surface-container-low text-center border-t border-surface-container-highest">
                <p class="text-sm text-on-surface-variant font-body">
                    Chưa có tài khoản? 
                    <a class="ml-1 text-primary font-bold hover:underline" href="#">Đăng ký ngay</a>
                </p>
            </div>
        </div>
    </main>
    
    <footer class="relative z-10 w-full border-t border-stone-300 dark:border-stone-800 bg-stone-200 dark:bg-stone-950 flex flex-col md:flex-row justify-between items-center px-12 py-8">
        <div class="text-lg font-semibold text-emerald-900 brand-logo">Botanical Atelier</div>
        <div class="flex gap-6 my-4 md:my-0">
            <a class="text-stone-500 hover:text-stone-800 font-['Inter'] text-sm tracking-wide transition-opacity hover:opacity-75" href="#">Chính sách bảo mật</a>
            <a class="text-stone-500 hover:text-stone-800 font-['Inter'] text-sm tracking-wide transition-opacity hover:opacity-75" href="#">Điều khoản sử dụng</a>
            <a class="text-stone-500 hover:text-stone-800 font-['Inter'] text-sm tracking-wide transition-opacity hover:opacity-75" href="#">Vận chuyển</a>
        </div>
        <div class="text-stone-500 font-['Inter'] text-sm tracking-wide opacity-70">
            © 2024 Botanical Atelier. Organic Professionalism.
        </div>
    </footer>
